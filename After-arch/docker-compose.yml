version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_KEY: ${SUPABASE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ML_SERVICE_URL: http://ml-service:5001
    depends_on:
      - ml-service
    networks:
      - app-network
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://backend:5000
      REACT_APP_ENV: ${REACT_APP_ENV:-development}
    depends_on:
      - backend
    networks:
      - app-network
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm start

  ml-service:
    build: ./ml-service
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: ${FLASK_ENV:-development}
      PORT: 5001
    networks:
      - app-network
    volumes:
      - ./ml-service:/app
      - ./ml-service/models:/app/models
    command: python app.py

networks:
  app-network:
    driver: bridge
